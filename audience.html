<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة الجمهور</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</head>

<body>
<div class="container">

<div class="card" id="rulesCard">
<h2>📜 قوانين مسابقة الجمهور</h2>
<ul style="line-height:2">
<li>❌ يمنع استخدام Google أو أي وسيلة بحث</li>
<li>❌ يمنع مساعدة الفرق أو مشاركة الإجابات</li>
<li>❌ يمنع إنشاء أكثر من حساب</li>
<li>⚠️ أي مخالفة تلغي المشاركة فورًا</li>
</ul>
<button id="acceptBtn">أوافق على الشروط</button></div>

<div class="card" id="authCard" style="display:none">
<h2>👤 تسجيل / دخول</h2>

<input id="username" placeholder="اسم المستخدم" />
<input id="password" type="password" placeholder="كلمة المرور" />

<div style="margin-top:15px;">
<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">تسجيل دخول</button>
</div>

<p id="authMsg" style="margin-top:10px;color:red;"></p>
</div>

<div class="card" id="welcomeCard" style="display:none">
<h2>🎯 مسابقة الجمهور</h2>

<div id="audienceGame" style="display:none">

<div style="font-size:18px;margin-bottom:10px;">
<span id="audMatch"></span>
</div>

<div style="font-size:20px;margin-bottom:10px;">
سؤال <span id="audQNum">—</span>
</div>

<div style="font-size:40px;margin-bottom:15px;" id="audTimer">—</div>

<div id="audAnswers" style="display:flex;gap:10px;justify-content:center;">
<button onclick="chooseAnswer('A')" class="answerBtn">A</button>
<button onclick="chooseAnswer('B')" class="answerBtn">B</button>
<button onclick="chooseAnswer('C')" class="answerBtn">C</button>
<button onclick="chooseAnswer('D')" class="answerBtn">D</button>
</div>

<p id="audMsg" style="margin-top:15px;"></p>

</div>

<p id="waitingMsg">انتظر بدء السؤال...</p>

</div>

</div>

<script>
(function(){
if(!initFirebaseOrShowError()) return;
const acceptBtn = document.getElementById("acceptBtn");
if(acceptBtn){
acceptBtn.addEventListener("click", function(){
document.getElementById("rulesCard").style.display = "none";
document.getElementById("authCard").style.display = "block";
});
}
const PATH="contest_v1/audience";
const usersRef = ref(PATH+"/users");

window.acceptRules = function(){
document.getElementById("rulesCard").style.display="none";
document.getElementById("authCard").style.display="block";
}

window.register = function(){
const u = username.value.trim();
const p = password.value.trim();

if(!u || !p){
authMsg.textContent="يرجى تعبئة جميع الحقول";
return;
}

usersRef.child(u).once("value", snap=>{
if(snap.exists()){
authMsg.textContent="اسم المستخدم موجود مسبقاً";
}else{
usersRef.child(u).set({
password: btoa(p),
score: 0
});
localStorage.setItem("audienceUser",u);
showWelcome();
}
});
}

window.login = function(){
const u = username.value.trim();
const p = password.value.trim();

usersRef.child(u).once("value", snap=>{
if(!snap.exists()){
authMsg.textContent="المستخدم غير موجود";
return;
}

const data = snap.val();
if(data.password !== btoa(p)){
authMsg.textContent="كلمة المرور غير صحيحة";
return;
}

localStorage.setItem("audienceUser",u);
showWelcome();
});
}

function showWelcome(){
document.getElementById("authCard").style.display="none";
document.getElementById("welcomeCard").style.display="block";
}


let stateRef = ref("contest_v1/state");
let answersRef = ref("contest_v1/audience/answers");

let currentMatch = null;
let currentQuestion = null;
let answered = false;

stateRef.on("value", snap=>{
const state = snap.val() || {};

if(!state.matchId || state.qIndex == null || state.qIndex < 0){
document.getElementById("audienceGame").style.display="none";
document.getElementById("waitingMsg").style.display="block";
return;
}

currentMatch = state.matchId;
currentQuestion = String(state.qIndex);

document.getElementById("audienceGame").style.display="block";
document.getElementById("waitingMsg").style.display="none";


document.getElementById("audQNum").textContent = state.qIndex + 1;

if(state.timerEnd){

const interval = setInterval(()=>{
const left = Math.max(0, Math.ceil((state.timerEnd-Date.now())/1000));
document.getElementById("audTimer").textContent = left;

if(left <= 0){
clearInterval(interval);
disableButtons();
}
},1000);

}else{
document.getElementById("audTimer").textContent = "—";
}
if(left === 0){
disableButtons();
}
}else{
document.getElementById("audTimer").textContent = "—";
}

answered = false;
document.getElementById("audMsg").textContent="";
enableButtons();
});

window.chooseAnswer = function(letter){

if(answered) return;

if(!user) return;

answersRef
.child(currentMatch)
.child(currentQuestion)
.child(user)
.set(letter);

answered = true;
document.getElementById("audMsg").textContent="تم تسجيل إجابتك ✔";
disableButtons();
}

function disableButtons(){
document.querySelectorAll("#audAnswers button").forEach(b=>b.disabled=true);
}

function enableButtons(){
document.querySelectorAll("#audAnswers button").forEach(b=>b.disabled=false);
}

})();
</script>
<script>
function acceptRules(){
document.getElementById("rulesCard").style.display="none";
document.getElementById("authCard").style.display="block";
}
</script>
</body>
</html>
