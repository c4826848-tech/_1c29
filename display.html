<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>شاشة العرض</title>

<link rel="stylesheet" href="style.css"/>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="brand">
<div class="logo">📺</div>

<div>
<h1 class="h1">شاشة العرض</h1>
<div class="p">السؤال والخيارات تظهر للجمهور</div>
</div>

</div>

<span class="badge" id="live">انتظار</span>
</div>



<div class="grid">


<div class="card" style="grid-column: span 12;">
<div class="row" style="justify-content:space-between">

<span class="badge green" id="match">—</span>

<span class="badge" id="qNum">سؤال —</span>

</div>
</div>



<div class="card center" style="grid-column: span 4;">

<div class="small">الوقت المتبقي</div>

<div class="timer" id="timer">—</div>

</div>



<div class="card" style="grid-column: span 8;">

<div class="question" id="qText">

انتظار بدء المباراة…

</div>

<div class="answers" id="answers"></div>

<div class="winnerBox" id="winner">

النتيجة: —

</div>

</div>



<div class="card" style="grid-column: span 12;">

<h2>ترتيب الفرق</h2>

<div id="liveStandings"></div>

</div>



<div class="card" style="grid-column: span 12;">

<h2>🏆 الأوائل من الجمهور</h2>

<div id="audienceTop5"></div>

</div>



</div>



<div class="footer">

ليالي رمضان الثقافية

</div>

</div>



<script>

(function(){

if(!initFirebaseOrShowError()) return;

const PATH="contest_v1";

const teamsRef=ref(PATH+"/teams");

const matchesRef=ref(PATH+"/matches");

const stateRef=ref(PATH+"/state");

const audienceUsersRef=ref(PATH+"/audience/users");



let teams={};

let matches={};

let state={};



/* عرض أفضل 5 من الجمهور */

function renderAudience(){

audienceUsersRef.once("value").then(snap=>{

if(!snap.exists()) return;

const users=snap.val();

const sorted=Object.keys(users)

.map(u=>({name:u,score:users[u].score||0}))

.sort((a,b)=>b.score-a.score)

.slice(0,5);



let html="";

sorted.forEach((u,i)=>{

html+=`

<div style="font-size:22px;margin:10px 0;display:flex;justify-content:space-between;">

<span>#${i+1} - ${u.name}</span>

<span>${u.score}</span>

</div>

`;

});

document.getElementById("audienceTop5").innerHTML=html;

});

}



/* ترتيب الفرق */

function renderTeams(){

let html="";

Object.values(teams).forEach(t=>{

html+=`

<div style="font-size:24px;margin:10px 0;font-weight:bold">

${t.name} — ${t.points || 0} نقطة

</div>

`;

});

document.getElementById("liveStandings").innerHTML=html;

}



/* عرض السؤال */

function renderQuestion(){

const q=state.question;

if(!q) return;

document.getElementById("qText").textContent=q.text||"";

const wrap=document.getElementById("answers");

wrap.innerHTML="";

(q.answers||[]).forEach((a,i)=>{

const b=document.createElement("button");

b.className="answerBtn";

b.textContent=LETTERS[i]+" ) "+a;

wrap.appendChild(b);

});

}



/* التايمر */

function renderTimer(){

if(!state.timerEnd){

document.getElementById("timer").textContent="—";

return;

}

const left=Math.max(0,

Math.ceil((state.timerEnd-Date.now())/1000)

);

document.getElementById("timer").textContent=left;

}



/* اسم المباراة */

function renderMatch(){

const m=matches[state.matchId];

if(!m) return;

const teamA=teams[m.teamA]?.name||m.teamA;

const teamB=teams[m.teamB]?.name||m.teamB;

document.getElementById("match").textContent=

teamA+" ضد "+teamB;

}



/* تحديث */

function render(){

renderMatch();

renderQuestion();

renderTimer();

renderTeams();

}



/* listeners */

teamsRef.on("value",snap=>{

teams=snap.val()||{};

renderTeams();

});



matchesRef.on("value",snap=>{

matches=snap.val()||{};

renderMatch();

});



stateRef.on("value",snap=>{

state=snap.val()||{};

document.getElementById("qNum").textContent=

state.qIndex>=0?"سؤال "+(state.qIndex+1):"سؤال —";

render();

renderAudience();

});



setInterval(renderTimer,500);



})();

</script>



<div class="designer-badge">

<a href="https://www.instagram.com/_1c29/" target="_blank">

تصميم وبرمجة: <strong>علي بن حيدر 🤎</strong>

</a>

</div>



</body>
