<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>التسجيل في البطولة</title>

<link rel="stylesheet" href="style.css"/>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

<style>

.register-box{
max-width:500px;
margin:60px auto;
text-align:center;
}

.register-title{
font-size:36px;
color:#d4af37;
margin-bottom:10px;
}

.register-sub{
color:#ccc;
margin-bottom:30px;
}

.register-box input{

width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:6px;
font-size:16px;

}

.register-btn{

width:100%;
padding:14px;
margin-top:10px;
background:#d4af37;
color:black;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;

}

.register-btn:hover{

opacity:.9;

}

.msg{

margin-top:15px;
font-size:16px;

}

</style>

</head>

<body>

<div class="register-box">

<div class="register-title">
بطولة أم حلوش الرمضانية
</div>

<div class="register-sub">
التسجيل للمشاركة في البطولة
</div>

<input id="name" placeholder="الاسم الكامل">

<input id="phone" placeholder="رقم الهاتف">

<input id="team" placeholder="اسم الفريق (اختياري)">

<button class="register-btn" onclick="register()">
تسجيل
</button>

<div id="msg" class="msg"></div>

</div>

<script>

const regRef = ref("contest_v1/registrations");

function register(){

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const team=document.getElementById("team").value.trim();

const msg=document.getElementById("msg");

if(!name || !phone){

msg.innerText="يرجى تعبئة جميع البيانات";
msg.style.color="red";
return;

}

/* منع التكرار */

regRef.orderByChild("phone").equalTo(phone).once("value",snap=>{

if(snap.exists()){

msg.innerText="تم التسجيل مسبقاً بهذا الرقم";
msg.style.color="orange";
return;

}

/* تسجيل جديد */

const id=Date.now();

regRef.child(id).set({

name:name,
phone:phone,
team:team,
time:Date.now()

});

msg.innerText="تم التسجيل بنجاح";
msg.style.color="#4caf50";

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("team").value="";

});

}

</script>

</body>
</html>
